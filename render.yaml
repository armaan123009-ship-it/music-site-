services:
  - type: web
    name: rocket-music
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rocket-music-db
          property: connectionString
      - key: FLASK_ENV
        value: production
    secretFiles:
      - name: cookies
        file: cookies.txt
      - name: browser
        file: browser.json

databases:
  - name: rocket-music-db
    databaseName: rocketmusic
    user: rocketmusic_user
    plan: free