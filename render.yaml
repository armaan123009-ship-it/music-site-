services:
  - type: web
    name: youtube-music-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ytmusic-db
          property: connectionString
      - key: FLASK_ENV
        value: production
    secretFiles:
      - name: cookies
        file: cookies.txt
      - name: browser
        file: browser.json

databases:
  - name: ytmusic-db
    databaseName: ytmusic
    user: ytmusic_user
    plan: free